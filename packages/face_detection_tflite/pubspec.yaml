name: face_detection_tflite
description: Slim face detection using only the front-camera TFLite model.
version: 1.0.3-bimobond-slim
publish_to: none

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  image: ^4.5.4
  tflite_flutter_custom: ^1.0.2
  path: ^1.9.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/face_detection_front.tflite

  plugin:
    platforms:
      android:
        dartPluginClass: FaceDetectionTfliteDart
      ios:
        dartPluginClass: FaceDetectionTfliteDart
